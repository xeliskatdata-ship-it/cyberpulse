version: '3.8'

services:

  # ─────────────────────────────────────────
  # PostgreSQL — Base de données CyberPulse
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: cyberpulse_postgres
    restart: always
    environment:
      POSTGRES_USER: cyberpulse
      POSTGRES_PASSWORD: cyberpulse123
      POSTGRES_DB: cyberpulse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - cyberpulse_net

  # ─────────────────────────────────────────
  # Airflow — Orchestration des pipelines
  # ─────────────────────────────────────────
  airflow:
    image: apache/airflow:2.8.0
    container_name: cyberpulse_airflow
    restart: always
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://cyberpulse:cyberpulse123@postgres:5432/cyberpulse_db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    volumes:
      - ./pipelines:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./.env:/opt/airflow/.env
    ports:
      - "8080:8080"
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin
                 --firstname CyberPulse --lastname Admin
                 --role Admin --email admin@cyberpulse.local &&
               airflow webserver & airflow scheduler"
    networks:
      - cyberpulse_net

  # ─────────────────────────────────────────
  # Streamlit — Dashboard CyberPulse
  # ─────────────────────────────────────────
  streamlit:
    image: python:3.11-slim
    container_name: cyberpulse_streamlit
    restart: always
    depends_on:
      - postgres
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
    command: >
      bash -c "pip install -r requirements.txt -q &&
               streamlit run app/app.py --server.port=8501 --server.address=0.0.0.0"
    networks:
      - cyberpulse_net

volumes:
  postgres_data:

networks:
  cyberpulse_net:
    driver: bridge
